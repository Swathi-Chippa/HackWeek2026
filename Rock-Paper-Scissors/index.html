<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Rock Paper Scissors</h1>
  <p>Pick your move and try to beat the computer!</p>

  <div class="choices">
    <button onclick="playRound('rock')">🪨 Rock</button>
    <button onclick="playRound('paper')">📄 Paper</button>
    <button onclick="playRound('scissors')">✂️ Scissors</button>
  </div>

  <div class="result-box">
    <p>You picked: <span id="playerChoice">-</span></p>
    <p>Computer picked: <span id="computerChoice">-</span></p>
    <p id="resultText">Make your move!</p>

    <div class="scoreboard">
      <p>Wins: <span id="winScore">0</span> |
         Losses: <span id="loseScore">0</span> |
         Ties: <span id="tieScore">0</span></p>
    </div>
  </div>

  <button id="resetBtn" onclick="resetGame()">Reset Game</button>

  <script src="script.js"></script>
</body>
</html>
